name: WakaTime README integration

on:
  schedule:
    # প্রতিদিন রাত ১২টায় (UTC) রান হবে। আপনি চাইলে সময় পরিবর্তন করতে পারেন।
    - cron: '0 0 * * *'
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন।

permissions:
  contents: write # আপনার README ফাইল Commit করার জন্য এই পারমিশন অপরিহার্য।

jobs:
  update-readme:
    name: Update README with WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - uses: athlon1600/wakatime-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_OS: "true" # Operating System শো করার জন্য এটি অপরিহার্য।
